<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - {{TITLE}}</title>
    <style>
        @page {
            margin: 0.6in;
            size: A4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', 'Segoe UI', 'Calibri', sans-serif;
            font-size: 11pt;
            line-height: 1.45;
            color: #2c3e50;
            background-color: #ffffff;
            max-width: 8.5in;
            margin: 0 auto;
            padding: 0.6in;
        }

        /* Header - Modern Typography */
        .header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #2980b9);
        }

        .name {
            font-size: 28pt;
            font-weight: 300;
            margin-bottom: 8px;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 14pt;
            margin-bottom: 14px;
            color: #3498db;
            font-weight: 500;
            text-transform: none;
        }

        .contact {
            font-size: 10pt;
            color: #7f8c8d;
            line-height: 1.4;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact a {
            color: #3498db;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        /* Section Styling - Modern Clean */
        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 13pt;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding-left: 0;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3498db;
            opacity: 0.7;
        }

        /* Experience Layout - Modern Card Style */
        .job {
            margin-bottom: 18px;
            padding: 14px 0;
            border-bottom: 1px solid #ecf0f1;
        }

        .job:last-child {
            border-bottom: none;
        }

        .job-header {
            margin-bottom: 6px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: baseline;
            gap: 20px;
        }

        .job-title-company {
            font-size: 12pt;
            line-height: 1.3;
        }

        .company {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 2px;
        }

        .job-title {
            color: #3498db;
            font-weight: 500;
            font-size: 11pt;
        }

        .dates-location {
            font-size: 9pt;
            color: #95a5a6;
            text-align: right;
            font-weight: 500;
            white-space: nowrap;
        }

        .bullet {
            margin-left: 16px;
            margin-bottom: 5px;
            text-align: justify;
            line-height: 1.4;
            position: relative;
        }

        .bullet::before {
            content: "▸";
            position: absolute;
            left: -16px;
            color: #3498db;
            font-weight: bold;
        }

        .metric {
            font-weight: 600;
            color: #27ae60;
        }

        .tech {
            font-weight: 500;
            color: #3498db;
        }

        /* Skills - Modern Category Style */
        .skills {
            line-height: 1.6;
            font-size: 10.5pt;
        }

        .skill-category {
            margin-bottom: 8px;
        }

        .skill-label {
            font-weight: 600;
            color: #2c3e50;
            margin-right: 8px;
        }

        .skill-primary {
            font-weight: 600;
            color: #3498db;
        }

        .skill-secondary {
            color: #7f8c8d;
        }

        /* Projects - Clean Modern Cards */
        .project {
            margin-bottom: 16px;
            padding: 12px 0;
            border-left: 3px solid #ecf0f1;
            padding-left: 16px;
        }

        .project-header {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 11.5pt;
            color: #2c3e50;
        }

        .project-year {
            color: #3498db;
            font-weight: 500;
        }

        .project-subtitle {
            font-style: italic;
            font-size: 10pt;
            margin-bottom: 6px;
            color: #7f8c8d;
            line-height: 1.3;
        }

        .project-url {
            color: #3498db;
            font-size: 9pt;
            margin-bottom: 4px;
        }

        /* Education & Publications - Streamlined */
        .education-item, .publication {
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f8f9fa;
        }

        .education-item:last-child, .publication:last-child {
            border-bottom: none;
        }

        .education-school, .publication-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 2px;
        }

        .education-dates {
            float: right;
            color: #95a5a6;
            font-size: 10pt;
            font-weight: 500;
        }

        .education-degree {
            color: #7f8c8d;
            font-size: 10pt;
            clear: both;
        }

        .publication-details {
            font-size: 10pt;
            color: #3498db;
            margin-bottom: 4px;
        }

        .publication-description {
            font-size: 10pt;
            color: #7f8c8d;
            line-height: 1.3;
        }

        /* Professional Summary - Highlighted */
        .summary {
            text-align: justify;
            line-height: 1.5;
            font-size: 11pt;
            padding: 16px 20px;
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        /* Page break control */
        .page-break {
            page-break-before: always;
        }

        .no-break {
            page-break-inside: avoid;
        }

        @media print {
            body {
                font-size: 10.5pt;
            }
            .section {
                margin-bottom: 22px;
            }
            .header {
                margin-bottom: 24px;
            }
            .summary {
                background: #ffffff;
                border-left: 3px solid #000000;
            }
        }

        @media screen {
            body {
                max-width: 900px;
                box-shadow: 0 0 20px rgba(0,0,0,0.1);
                background: white;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    {{CONTENT}}
</body>
</html>
